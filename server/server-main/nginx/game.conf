server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(register|login|main)(/|$) {
        proxy_pass http://api:8080;
        include /etc/nginx/proxy-common.inc;
    }

    location ~ ^/(steps|battle|stages)(/|$) {
        proxy_pass http://api:8080;
        include /etc/nginx/proxy-common.inc;
    }

    location ^~ /api/ {
        proxy_pass http://api:8080;
        include /etc/nginx/proxy-common.inc;
    }

    location ~ ^/(index\.html|main\.dart\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json|\.last_build_id)$ {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?|wasm)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
