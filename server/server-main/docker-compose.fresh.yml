# Fresh local test database only.
# Do not use this for normal play testing or existing-account login.
# Use docker-compose.local.yml instead.
services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    container_name: pocketbase-fresh
    ports:
      - "8091:8090"
    volumes:
      - pocketbase_fresh_data:/pb/pb_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api-fresh
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pocketbase_fresh_data:
