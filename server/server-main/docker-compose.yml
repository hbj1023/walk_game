services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    container_name: pocketbase
    ports:
      - "${POCKETBASE_PORT:-8090}:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: game-web
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./nginx/game.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-common.inc:/etc/nginx/proxy-common.inc:ro
      - ./web_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  pocketbase_data:
